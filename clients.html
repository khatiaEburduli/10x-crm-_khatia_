<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Clients</title>

    <link rel="stylesheet" href="assets/css/clients.css">
</head>
<body>

<header class="header">

    <h2>10X CRM</h2>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="clients.html">Clients</a>
        <a href="profile.html">Profile</a>
        <button id="logoutBtn">Logout</button>
    </nav>

</header>

<main class="clients-page">

    <div class="page-header">

        <h1>Clients</h1>

        <button id="openClientModal">
            + Add Client
        </button>

    </div>

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Email</th>
                <th>Company</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="clientsTableBody">

        </tbody>

    </table>

</main>

<div id="clientModal" class="modal hidden">

    <div class="modal-content">

        <h2>Add Client</h2>

        <form id="clientForm" novalidate>

            <input
                type="text"
                id="clientName"
                placeholder="Client Name"
            >

            <small id="clientNameError" class="error-message"></small>

            <input
                type="email"
                id="clientEmail"
                placeholder="Client Email"
            >

            <small id="clientEmailError" class="error-message"></small>

            <input
                type="text"
                id="clientCompany"
                placeholder="Company"
            >

            <small id="clientCompanyError" class="error-message"></small>

            <div class="modal-actions">

                <button type="submit">
                    Save Client
                </button>

                <button type="button" id="closeModal">
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

<div id="toast" class="toast"></div>

<script src="assets/js/helpers.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/clients.js"></script>

</body>
</html>
