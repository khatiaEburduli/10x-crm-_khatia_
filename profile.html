<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Profile</title>

    <link rel="stylesheet" href="assets/css/profile.css">
</head>
<body>

<header class="header">

    <h2>10X CRM</h2>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="clients.html">Clients</a>
        <a href="profile.html">Profile</a>
        <button id="themeToggle">Dark Mode</button>
        <button id="logoutBtn">Logout</button>
    </nav>

</header>

<main class="profile-page">

    <div class="profile-card">

        <div class="avatar" id="avatar">
            KB
        </div>

        <h2 id="profileName">Full Name</h2>

        <p id="profileEmail">email@example.com</p>

        <p id="profileCompany">Company</p>

        <p id="memberSince">
            Member since:
            <span id="memberDate"></span>
        </p>

    </div>

    <div class="profile-form">

        <h2>Edit Profile</h2>

        <form id="profileForm">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name"
            >

            <small id="fullNameError" class="error-message"></small>

            <input
                type="text"
                id="company"
                placeholder="Company"
            >

            <small id="companyError" class="error-message"></small>

            <button type="submit">
                Save Changes
            </button>

        </form>

    </div>

    <div class="password-form">

    <h2>Change Password</h2>

    <form id="passwordForm">

        <input
            type="password"
            id="currentPassword"
            placeholder="Current Password"
        >

        <small id="currentPasswordError" class="error-message"></small>

        <input
            type="password"
            id="newPassword"
            placeholder="New Password"
        >

        <small id="newPasswordError" class="error-message"></small>

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
        >

        <small id="confirmPasswordError" class="error-message"></small>

        <button type="submit">
            Change Password
        </button>

    </form>

</div>

<div class="danger-zone">

    <h2>Danger Zone</h2>

    <p>
        Reset all CRM client data.
    </p>

    <button id="resetDataBtn">
        Reset CRM Data
    </button>

</div>

</main>

<div id="toast"></div>

<script src="assets/js/helpers.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/profile.js"></script>
<script src="assets/js/theme.js"></script>

</body>
</html>
